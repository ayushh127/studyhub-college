{% extends "base.html" %}

{% block title %}Register New College - Platform Admin{% endblock %}

{% block content %}
<div style="display: flex; gap: 2rem;">
    <!-- Sidebar -->
    <aside style="width: 250px;">
        {% include "components/admin_sidebar.html" %}
    </aside>
    
    <!-- Main Content -->
    <div style="flex: 1;">
        <div class="card" style="max-width: 700px; margin: 0 auto;">
            <h2 style="border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; margin-bottom: 1.5rem;">Register New College</h2>
            
            <form method="POST">
                <div class="form-group">
                    <label for="name">College Name</label>
                    <input type="text" id="name" name="name" class="form-control" value="{{ form_data.name if form_data else '' }}" required placeholder="e.g. Global Tech Institute">
                </div>

                <div style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label for="code">College Code (Unique)</label>
                        <input type="text" id="code" name="code" class="form-control" value="{{ form_data.code if form_data else '' }}" required placeholder="e.g. GTI" style="text-transform: uppercase;">
                    </div>
                    
                    <div class="form-group" style="flex: 1;">
                        <label for="status">Initial Status</label>
                        <select id="status" name="status" class="form-control" required>
                            <option value="active" {{ 'selected' if not form_data or form_data.status == 'active' else '' }}>Active</option>
                            <option value="inactive" {{ 'selected' if form_data and form_data.status == 'inactive' else '' }}>Inactive</option>
                        </select>
                    </div>
                </div>

                <div style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label for="city">City</label>
                        <input type="text" id="city" name="city" class="form-control" value="{{ form_data.city if form_data else '' }}" required placeholder="e.g. Metropolis">
                    </div>
                    
                    <div class="form-group" style="flex: 1;">
                        <label for="state">State</label>
                        <input type="text" id="state" name="state" class="form-control" value="{{ form_data.state if form_data else '' }}" required placeholder="e.g. Tech State">
                    </div>
                </div>

                <div class="form-group">
                    <label for="address">Full Address</label>
                    <textarea id="address" name="address" class="form-control" rows="3" required placeholder="Street address, building, suite...">{{ form_data.address if form_data else '' }}</textarea>
                </div>

                <div style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label for="contact_email">Contact Email</label>
                        <input type="email" id="contact_email" name="contact_email" class="form-control" value="{{ form_data.contact_email if form_data else '' }}" required placeholder="e.g. contact@gti.edu">
                    </div>
                    
                    <div class="form-group" style="flex: 1;">
                        <label for="contact_phone">Contact Phone</label>
                        <input type="tel" id="contact_phone" name="contact_phone" class="form-control" value="{{ form_data.contact_phone if form_data else '' }}" required placeholder="e.g. +1234567890">
                    </div>
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 1.5rem;">
                    <button type="submit" class="btn btn-primary">Create College</button>
                    <a href="{{ url_for('admin.colleges') }}" class="btn" style="border: 1px solid var(--border); background: white;">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
