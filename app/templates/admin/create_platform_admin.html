{% extends "base.html" %}

{% block title %}Create Platform Admin - Admin{% endblock %}

{% block content %}
<div style="display: flex; gap: 2rem;">
    <aside style="width: 250px;">
        {% include "components/admin_sidebar.html" %}
    </aside>
    
    <div style="flex: 1;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <h2>Create Platform Admin</h2>
            <a href="{{ url_for('admin.users') }}" class="btn btn-outline">Back to Users</a>
        </div>
        
        <div class="card" style="max-width: 600px;">
            <form method="POST" action="{{ url_for('admin.create_platform_admin') }}">
                <div class="form-group">
                    <label for="full_name">Full Name <span style="color: var(--danger);">*</span></label>
                    <input type="text" id="full_name" name="full_name" class="form-control" required autofocus>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address <span style="color: var(--danger);">*</span></label>
                    <input type="email" id="email" name="email" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password <span style="color: var(--danger);">*</span></label>
                    <input type="password" id="password" name="password" class="form-control" required minlength="6">
                    <small style="color: var(--muted);">Minimum 6 characters.</small>
                </div>
                
                <div class="form-group">
                    <label for="confirm_password">Confirm Password <span style="color: var(--danger);">*</span></label>
                    <input type="password" id="confirm_password" name="confirm_password" class="form-control" required minlength="6">
                </div>
                
                <div style="margin-top: 1.5rem;">
                    <button type="submit" class="btn btn-primary">Create Platform Admin</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
