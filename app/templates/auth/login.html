{% extends "base.html" %}

{% block title %}Login - StudyHub College{% endblock %}

{% block content %}
<div style="max-width: 450px; margin: 2rem auto;">
    <div class="card">
        <h2 style="text-align: center; font-family: 'Cormorant Garamond', serif; font-size: 2rem;">Welcome Back</h2>
        <p style="text-align: center; color: var(--muted); margin-bottom: 1.5rem;">Use your registered email and password to log in.</p>
        
        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="name@example.com" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <div style="margin-top: 1.5rem;">
                <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.1rem; padding: 0.75rem;">Login</button>
            </div>
        </form>
        
        <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
            <p>Don't have an account? <a href="{{ url_for('auth.register') }}" style="color: var(--primary); font-weight: 500;">Register here</a>.</p>
            <p><a href="{{ url_for('auth.forgot_password') }}" style="color: var(--muted);">Forgot password?</a></p>
        </div>

    </div>
</div>
{% endblock %}
