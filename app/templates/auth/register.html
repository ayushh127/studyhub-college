{% extends "base.html" %}

{% block title %}Student Registration - StudyHub College{% endblock %}

{% block content %}
<div style="display: flex; align-items: center; justify-content: center; min-height: 70vh; padding: 2rem 1rem;">
    <div class="card" style="width: 100%; max-width: 440px; padding: 2.5rem; border-radius: 16px; border: 1px solid var(--border); box-shadow: var(--shadow-lg); background-color: var(--surface);">
        <div style="text-align: center; margin-bottom: 2rem;">
            <span style="font-size: 2.5rem; display: block; margin-bottom: 0.75rem;">🎓</span>
            <h2 style="margin: 0; font-size: 1.75rem; font-weight: 800; letter-spacing: -0.03em; color: var(--text);">Student Register</h2>
            <p style="color: var(--muted); font-size: 0.9rem; margin-top: 0.35rem; font-weight: 500;">Create your StudyHub College student account.</p>
        </div>
        
        <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="form-group" style="margin-bottom: 1.25rem;">
                <label for="full_name" style="font-weight: 600; font-size: 0.85rem; color: var(--text); display: block; margin-bottom: 0.4rem;">Full Name</label>
                <input type="text" id="full_name" name="full_name" class="form-control" placeholder="Ayush Sharma" required autofocus style="border-radius: 8px; border: 1px solid var(--border); padding: 0.65rem 0.85rem; font-size: 0.95rem;">
            </div>
            <div class="form-group" style="margin-bottom: 1.25rem;">
                <label for="email" style="font-weight: 600; font-size: 0.85rem; color: var(--text); display: block; margin-bottom: 0.4rem;">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="name@example.com" required style="border-radius: 8px; border: 1px solid var(--border); padding: 0.65rem 0.85rem; font-size: 0.95rem;">
            </div>
            <div class="form-group" style="margin-bottom: 1.5rem;">
                <label for="password" style="font-weight: 600; font-size: 0.85rem; color: var(--text); display: block; margin-bottom: 0.4rem;">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required style="border-radius: 8px; border: 1px solid var(--border); padding: 0.65rem 0.85rem; font-size: 0.95rem;">
            </div>
            
            <button type="submit" class="btn btn-primary btn-lg btn-full" style="font-weight: 600; font-size: 1rem; border-radius: 8px; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15);">Create Account</button>
        </form>
        
        <div style="text-align: center; margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 1.5rem; font-size: 0.875rem;">
            <p style="margin-bottom: 0; color: var(--muted); font-weight: 500;">
                Already have an account? <a href="{{ url_for('auth.login') }}" style="color: var(--primary); font-weight: 600; text-decoration: none;">Login here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
