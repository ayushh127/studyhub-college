{% extends "base.html" %}

{% block title %}Student Registration - StudyHub College{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 2rem auto;">
    <div class="card">
        <h2 style="text-align: center;">Student Registration</h2>
        <p style="text-align: center; color: var(--muted); margin-bottom: 1.5rem;">Create your student account</p>
        
        <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="form-group">
                <label for="full_name">Full Name</label>
                <input type="text" id="full_name" name="full_name" class="form-control" required autofocus>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>
            <div style="margin-top: 1.5rem;">
                <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
            </div>
        </form>
        
        <div style="text-align: center; margin-top: 1rem; font-size: 0.9rem;">
            <p>Already have an account? <a href="{{ url_for('auth.login') }}" style="color: var(--primary);">Login here</a>.</p>
        </div>
    </div>
</div>
{% endblock %}
