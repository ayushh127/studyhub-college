{% extends "base.html" %}

{% block title %}{{ 'Edit' if unit else 'Create' }} Unit - {{ subject.name }} - College Admin{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 2rem auto;">
    <div class="card">
        <h2>{{ 'Edit' if unit else 'Add' }} Unit</h2>
        <p class="muted">Subject: <strong>{{ subject.name }} ({{ subject.code }})</strong></p>
        
        <form method="POST" style="margin-top: 1.5rem;">
            <div class="form-group">
                <label for="unit_number">Unit / Chapter Number</label>
                <input type="number" id="unit_number" name="unit_number" class="form-control" min="1" max="100" value="{{ unit.unit_number if unit else '1' }}" required>
            </div>
            
            <div class="form-group">
                <label for="title">Unit Title</label>
                <input type="text" id="title" name="title" class="form-control" value="{{ unit.title if unit else '' }}" required placeholder="e.g. Memory Management or Object-Oriented Principles">
            </div>
            
            <div class="form-group">
                <label for="description">Description (Optional)</label>
                <textarea id="description" name="description" class="form-control" rows="4" placeholder="Brief outline of unit topics...">{{ unit.description if unit else '' }}</textarea>
            </div>
            
            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <button type="submit" class="btn btn-primary">{{ 'Save Changes' if unit else 'Create Unit' }}</button>
                <a href="{{ url_for('college_admin.subject_detail', id=subject.id) }}" class="btn" style="border: 1px solid var(--border);">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
