<div class="card" style="padding: 1.25rem; border-radius: var(--radius); border: 1px solid var(--border);">
    <div style="border-bottom: 1px solid var(--border); padding-bottom: 1rem; margin-bottom: 1rem;">
        <strong style="display: block; font-size: 1.1rem; color: var(--primary-dark); font-weight: 700;">{{ current_user.full_name }}</strong>
        <span class="badge" style="background-color: var(--primary); color: white; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600; display: inline-block; margin-top: 0.35rem; border: none;">Platform Admin</span>
    </div>
    <h3 style="font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 0.75rem; font-weight: 700;">Admin Menu</h3>
    <ul style="list-style: none; display: flex; flex-direction: column; gap: 0.35rem;">
        <li><a href="{{ url_for('admin.dashboard') }}" style="display: block; padding: 0.5rem 0.75rem; border-radius: 6px; text-decoration: none; color: var(--text); font-size: 0.9rem; font-weight: 500; transition: all 0.15s;" onmouseover="this.style.backgroundColor='var(--surface-soft)'; this.style.color='var(--primary)';" onmouseout="this.style.backgroundColor='transparent'; this.style.color='var(--text)';">Dashboard</a></li>
        <li><a href="{{ url_for('admin.college_requests') }}" style="display: block; padding: 0.5rem 0.75rem; border-radius: 6px; text-decoration: none; color: var(--text); font-size: 0.9rem; font-weight: 500; transition: all 0.15s;" onmouseover="this.style.backgroundColor='var(--surface-soft)'; this.style.color='var(--primary)';" onmouseout="this.style.backgroundColor='transparent'; this.style.color='var(--text)';">College Requests</a></li>
        <li><a href="{{ url_for('admin.colleges') }}" style="display: block; padding: 0.5rem 0.75rem; border-radius: 6px; text-decoration: none; color: var(--text); font-size: 0.9rem; font-weight: 500; transition: all 0.15s;" onmouseover="this.style.backgroundColor='var(--surface-soft)'; this.style.color='var(--primary)';" onmouseout="this.style.backgroundColor='transparent'; this.style.color='var(--text)';">Colleges</a></li>
        <li><a href="{{ url_for('admin.create_college') }}" style="display: block; padding: 0.5rem 0.75rem; border-radius: 6px; text-decoration: none; color: var(--text); font-size: 0.9rem; font-weight: 500; transition: all 0.15s;" onmouseover="this.style.backgroundColor='var(--surface-soft)'; this.style.color='var(--primary)';" onmouseout="this.style.backgroundColor='transparent'; this.style.color='var(--text)';">Add College</a></li>
        <li><a href="{{ url_for('admin.community_list') }}" style="display: block; padding: 0.5rem 0.75rem; border-radius: 6px; text-decoration: none; color: var(--text); font-size: 0.9rem; font-weight: 500; transition: all 0.15s;" onmouseover="this.style.backgroundColor='var(--surface-soft)'; this.style.color='var(--primary)';" onmouseout="this.style.backgroundColor='transparent'; this.style.color='var(--text)';">Community Library</a></li>
        <li><a href="{{ url_for('admin.community_queue') }}" style="display: block; padding: 0.5rem 0.75rem; border-radius: 6px; text-decoration: none; color: var(--text); font-size: 0.9rem; font-weight: 500; transition: all 0.15s;" onmouseover="this.style.backgroundColor='var(--surface-soft)'; this.style.color='var(--primary)';" onmouseout="this.style.backgroundColor='transparent'; this.style.color='var(--text)';">Moderation Queue</a></li>
        <li><a href="{{ url_for('admin.users') }}" style="display: block; padding: 0.5rem 0.75rem; border-radius: 6px; text-decoration: none; color: var(--text); font-size: 0.9rem; font-weight: 500; transition: all 0.15s;" onmouseover="this.style.backgroundColor='var(--surface-soft)'; this.style.color='var(--primary)';" onmouseout="this.style.backgroundColor='transparent'; this.style.color='var(--text)';">Users</a></li>
        <li><a href="{{ url_for('admin.audit_logs') }}" style="display: block; padding: 0.5rem 0.75rem; border-radius: 6px; text-decoration: none; color: var(--text); font-size: 0.9rem; font-weight: 500; transition: all 0.15s;" onmouseover="this.style.backgroundColor='var(--surface-soft)'; this.style.color='var(--primary)';" onmouseout="this.style.backgroundColor='transparent'; this.style.color='var(--text)';">Audit Logs</a></li>
        <li><a href="{{ url_for('admin.settings') }}" style="display: block; padding: 0.5rem 0.75rem; border-radius: 6px; text-decoration: none; color: var(--text); font-size: 0.9rem; font-weight: 500; transition: all 0.15s;" onmouseover="this.style.backgroundColor='var(--surface-soft)'; this.style.color='var(--primary)';" onmouseout="this.style.backgroundColor='transparent'; this.style.color='var(--text)';">Settings</a></li>
        <li style="margin-top: 1rem; border-top: 1px solid var(--border); padding-top: 0.75rem;">
            <a href="{{ url_for('auth.logout') }}" style="display: block; padding: 0.5rem 0.75rem; border-radius: 6px; text-decoration: none; color: var(--danger); font-size: 0.9rem; font-weight: 600; transition: all 0.15s;" onmouseover="this.style.backgroundColor='#FEE2E2';" onmouseout="this.style.backgroundColor='transparent';">Logout</a>
        </li>
    </ul>
</div>
