{% extends "base.html" %}

{% block title %}Quiz (Learning) - {{ quiz.title }}{% endblock %}

{% block content %}
<div style="max-width: 800px; margin: 2rem auto;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
        <h2 style="margin: 0;">{{ quiz.title }}</h2>
        <span class="muted">Question {{ current }} of {{ total }}</span>
    </div>
    
    <div class="progress-bar" style="width: 100%; height: 8px; background-color: var(--border); border-radius: 4px; margin-bottom: 2rem; overflow: hidden;">
        <div style="width: {{ (current - 1) / total * 100 }}%; height: 100%; background-color: var(--primary); transition: width 0.3s ease;"></div>
    </div>
    
    <div class="card" style="padding: 2rem;">
        <h3 style="margin-top: 0; margin-bottom: 1.5rem; font-size: 1.25rem;">{{ question.question_text }}</h3>
        
        <form method="POST" action="{{ url_for('student.submit_answer', attempt_id=attempt.id) }}">
            <input type="hidden" name="question_id" value="{{ question.id }}">
            
            <div style="display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2rem;">
                {% for opt in question.options|sort(attribute='order_number') %}
                <label style="display: flex; align-items: center; gap: 1rem; padding: 1rem; border: 1px solid var(--border); border-radius: 4px; cursor: pointer;">
                    <input type="radio" name="selected_option_id" value="{{ opt.id }}" required>
                    <span>{{ opt.option_text }}</span>
                </label>
                {% endfor %}
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.1rem;">Submit Answer</button>
        </form>
    </div>
</div>
{% endblock %}
