{% extends "base.html" %}

{% block title %}Select College - StudyHub College{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 4rem auto;">
    <div class="card" style="text-align: center; padding: 3rem 2rem;">
        <h2 style="margin-top: 0; margin-bottom: 1.5rem; font-weight: 800;">Welcome to StudyHub</h2>
        <p class="muted" style="margin-bottom: 2rem;">Please select your college to view relevant study materials and quizzes.</p>
        
        <form method="POST" action="{{ url_for('student.select_college') }}">
            <div class="form-group" style="text-align: left; margin-bottom: 2rem;">
                <label for="college_id"><strong>Select College</strong></label>
                <select name="college_id" id="college_id" class="form-control" required style="width: 100%; padding: 0.75rem; margin-top: 0.5rem; border: 1px solid var(--border); border-radius: 4px;">
                    <option value="" disabled selected>-- Select a College --</option>
                    {% for college in colleges %}
                    <option value="{{ college.id }}">{{ college.name }} ({{ college.code }})</option>
                    {% endfor %}
                </select>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.1rem; padding: 0.75rem;">Continue to Dashboard</button>
        </form>
    </div>
</div>
{% endblock %}
